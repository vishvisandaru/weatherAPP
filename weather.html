<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <style>
    * {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    box-sizing: border-box;
    }
    .hero{
        width: 100%;
        height: 100vh;
        
        
    }
    .back-video {
  position: absolute;
  right: 0;
  bottom: 0;
  z-index: -1;
 left: 0;
}
 .container {
      text-align: center;
      padding: 30px 20px;
    }

    h1 {
      color: black;
      font-size: 400%;
      font-family: 'Times New Roman', Times, serif;
    }

    .city-buttons button {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    .city-buttons button:hover {
      background-color: #e8f139;
    }

    #weather-info {
        font-size: 150%;
      margin-top: 30px;
      padding: 10px;
      border-radius: 5px;
    
    }
    @media(min-aspect-ratio:16/9){
    .back-video{
        width:100%;
        height: auto;
    }
}
  </style>
</head>
<body>
   <div class="hero">
    <video autoplay muted loop muted plays-inline class="back-video">
        <source src="wea.mp4" type="video/mp4">
      </video>

  <div class="container">
    <h1>City Weather Checker</h1>
    <br>
    <br>
    <div class="city-buttons">
      <button data-city="New York">New York</button>
      <button data-city="London">London</button>
      <button data-city="Tokyo">Tokyo</button>
      <button data-city="Colombo">Colombo</button>
      <button data-city="Dubai">Dubai</button>
    </div>
    <div id="weather-info">
      <p>Select a city to see the weather details.</p>
    </div>
  </div>
</div>
  <script>
    // Your OpenWeatherMap API key (replace with your actual key)
    const API_KEY = "785d91fdb2c2980610a86b02d581ad91";
    const BASE_URL = "https://api.openweathermap.org/data/2.5/weather";

    // Function to fetch and display weather data
    async function getWeather(city) {
      const url = `${BASE_URL}?q=${city}&appid=${API_KEY}&units=metric`;

      try {
        const response = await fetch(url);
        if (!response.ok) {
          throw new Error("Weather data not found.");
        }
        const data = await response.json();
        displayWeather(data);
      } catch (error) {
        document.getElementById("weather-info").innerHTML = `<p>${error.message}</p>`;
      }
    }

    // Function to display weather data
    function displayWeather(data) {
      const { name, main, weather, wind } = data;

      document.getElementById("weather-info").innerHTML = `
        <h2>Weather in ${name}</h2>
        <br>
        <p><strong>Temperature:</strong> ${main.temp}°C</p>
          <br>
        <p><strong>Condition:</strong> ${weather[0].description}</p>
          <br>
        <p><strong>Wind Speed:</strong> ${wind.speed} m/s</p>
      `;
    }

    // Add event listeners to buttons
    document.querySelectorAll(".city-buttons button").forEach((button) => {
      button.addEventListener("click", () => {
        const city = button.getAttribute("data-city");
        getWeather(city);
      });
    });
  </script>
</body>
</html>
